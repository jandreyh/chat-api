<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GoChat — Chat en Tiempo Real</title>
<script>
  // Anti-flash: aplica el tema guardado o la preferencia del sistema antes del primer render
  (function () {
    try {
      var saved = localStorage.getItem('theme');
      var prefersLight = window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches;
      if (saved === 'light' || (saved !== 'dark' && prefersLight)) {
        document.documentElement.dataset.theme = 'light';
      }
    } catch (error) { /* localStorage no disponible */ }
  })();
</script>
<link rel="stylesheet" href="/css/styles.css">
</head>
<body>

<!-- ── LOGIN ── -->
<div id="login-screen">
  <div class="login-card">
    <button class="btn-theme btn-theme-floating" onclick="toggleTheme()" aria-label="Cambiar tema">
      <svg class="icon-sun" viewBox="0 0 24 24"><circle cx="12" cy="12" r="4"></circle><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"></path></svg>
      <svg class="icon-moon" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
    </button>
    <div class="tech-tag">
      <span style="width:6px;height:6px;border-radius:50%;background:#60A5FA"></span>
      WebSocket · Go · Goroutines
    </div>
    <div class="login-logo">GoChat</div>
    <div class="login-sub">Chat en tiempo real con Go y WebSocket</div>

    <input type="text" id="input-username" placeholder="Tu nombre de usuario" maxlength="20" />
    <input type="text" id="input-room" placeholder="Sala (ej: Go, General, DevOps)" maxlength="30" />
    <button onclick="connect()">Entrar al chat →</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<!-- ── CHAT ── -->
<div id="chat-screen">

  <div class="chat-header">
    <div class="header-logo">Go</div>
    <div class="header-room">
      <span class="room-badge" id="header-room">General</span>
      <div class="ws-status">
        <div class="ws-dot" id="ws-dot"></div>
        <span id="ws-status-text">Conectado</span>
      </div>
    </div>
    <button class="btn-theme" onclick="toggleTheme()" aria-label="Cambiar tema">
      <svg class="icon-sun" viewBox="0 0 24 24"><circle cx="12" cy="12" r="4"></circle><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"></path></svg>
      <svg class="icon-moon" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
    </button>
    <button class="btn-leave" onclick="disconnect()">Salir</button>
  </div>

  <div class="chat-body">
    <div class="messages-area">
      <div id="messages"></div>
      <div class="input-area">
        <input
          type="text"
          id="msg-input"
          placeholder="Escribe un mensaje..."
          maxlength="500"
          onkeydown="if(event.key==='Enter') sendMessage()"
        />
        <button id="send-btn" onclick="sendMessage()">
          <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>
      </div>
    </div>

    <div class="sidebar">
      <div>
        <div class="sidebar-title" style="margin-bottom:10px">En la sala</div>
        <div id="users-list"></div>
      </div>

      <div>
        <div class="sidebar-title" style="margin-bottom:8px">Go en acción</div>
        <div class="concepts-box">
          <div class="concept-item">
            <span class="concept-kw">goroutine</span>
            <span>Una por cliente (Read + Write)</span>
          </div>
          <div class="concept-item">
            <span class="concept-kw">channel</span>
            <span>Broadcast, Register, Send</span>
          </div>
          <div class="concept-item">
            <span class="concept-kw">select</span>
            <span>Hub multiplexa eventos</span>
          </div>
          <div class="concept-item">
            <span class="concept-kw">map</span>
            <span>Salas y clientes activos</span>
          </div>
          <div class="concept-item">
            <span class="concept-kw">defer</span>
            <span>Cleanup al desconectar</span>
          </div>
        </div>
      </div>
    </div>
  </div>

</div>

<script src="/js/app.js"></script>
</body>
</html>
